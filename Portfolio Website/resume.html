<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume | Artem Gomov</title>
    <meta
      name="description"
      content="Resume page for Artem Gomov with embedded PDF viewer."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="resume-shell">
      <header class="site-header">
        <div class="header-branding">
          <a class="brand" href="index.html">
            <span class="brand-mark">
              <img
                src="assets/images/profile-photo.jpg"
                alt="Portrait of Artem Gomov"
              />
            </span>
            <span class="brand-name">Artem Gomov</span>
          </a>
          <div class="header-contact" aria-label="Contact links">
            <a href="mailto:artemgomov@vt.edu">artemgomov@vt.edu</a>
            <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/artemgomov" target="_blank" rel="noreferrer">LinkedIn</a>
          </div>
        </div>

        <nav class="site-nav" aria-label="Primary">
          <a href="index.html#projects">Projects</a>
          <a href="resume.html">Resume</a>
          <a href="index.html#contact">Contact</a>
        </nav>
      </header>

      <main class="resume-page">
        <section class="resume-hero">
          <p class="eyebrow">Resume</p>
          <h1>Professional experience, projects, and technical work.</h1>
          <p>
            Place your PDF at <strong>assets/docs/resume.pdf</strong> and it will
            appear directly in the viewer below.
          </p>
        </section>

        <section class="resume-viewer">
          <object
            class="resume-frame"
            data="assets/docs/resume.pdf"
            type="application/pdf"
          >
            <p class="resume-fallback">
              PDF preview unavailable. Open the file directly:
              <a href="assets/docs/resume.pdf">resume.pdf</a>
            </p>
          </object>
          <p class="resume-fallback">
            If the viewer is blank, add your file at
            <strong>assets/docs/resume.pdf</strong>.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
